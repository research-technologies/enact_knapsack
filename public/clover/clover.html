<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <link rel="stylesheet" type="text/css" href="clover.css">
        <style>
          html, body { margin: 0; height: 100%; }
          clover-viewer { display: block; height: 100%; }
          clover-viewer :has(.clover-viewer-content) { height: 100% !important; }
          .clover-viewer-content { height: 100% !important; }
          .clover-viewer-player-wrapper,
          .clover-viewer-painting :has(> .clover-viewer-player-wrapper) { background-color: transparent !important; }
          .clover-viewer-painting { padding-left: 16px !important; padding-right: 16px !important; }
          .clover-viewer-information-panel { overflow-wrap: anywhere; }
        </style>
    </head>
    <body>
    <script type="text/javascript" src="clover.js"></script>
    <clover-viewer />
    <script>
        manifestUrl = new URLSearchParams(window.location.search).get('manifest');
        viewer = document.querySelector('clover-viewer')
        viewer.setAttribute('id', manifestUrl)
    </script>
    </body>
</html>
