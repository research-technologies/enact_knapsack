# Controlled vocabulary of contributor roles, and the single source of truth for
# the role codes. The 14 NISO CRediT terms (credit.niso.org) plus the
# practice-research roles CRediT does not cover, seeded from the Pathfinder
# discovery docs (refined by curators over time).
#
# The STORED value on a `contributors` compound entry is the `id` code (e.g.
# "data-curation"), never the label — exactly as `relationship_type` stores
# "source-of". `term` is the human label.
#
# Each term also carries the interop metadata a future DOI/RAiD/ORCID minter
# needs (Enact::ContributorRole reads it from here; nothing is hardcoded in
# Ruby):
#   source     — credit | practice
#   credit_uri — CRediT role URI, omitted for practice roles
#   datacite   — DataCite contributorType (schema 4.x); defaults to "Other"
#   marc       — MARC relator code where one fits a practice role
#
# Anything not in this list is captured free-text in the sibling
# `contributor_role_other` subproperty (the never-block-deposit fallback).
terms:
  # --- CRediT (14 NISO terms) ---
  - id: conceptualization
    term: Conceptualization
    source: credit
    credit_uri: https://credit.niso.org/contributor-roles/conceptualization/
    datacite: Other
  - id: data-curation
    term: Data curation
    source: credit
    credit_uri: https://credit.niso.org/contributor-roles/data-curation/
    datacite: DataCurator
  - id: formal-analysis
    term: Formal analysis
    source: credit
    credit_uri: https://credit.niso.org/contributor-roles/formal-analysis/
    datacite: Other
  - id: funding-acquisition
    term: Funding acquisition
    source: credit
    credit_uri: https://credit.niso.org/contributor-roles/funding-acquisition/
    datacite: Other
  - id: investigation
    term: Investigation
    source: credit
    credit_uri: https://credit.niso.org/contributor-roles/investigation/
    datacite: Other
  - id: methodology
    term: Methodology
    source: credit
    credit_uri: https://credit.niso.org/contributor-roles/methodology/
    datacite: Other
  - id: project-administration
    term: Project administration
    source: credit
    credit_uri: https://credit.niso.org/contributor-roles/project-administration/
    datacite: ProjectLeader
  - id: resources
    term: Resources
    source: credit
    credit_uri: https://credit.niso.org/contributor-roles/resources/
    datacite: Other
  - id: software
    term: Software
    source: credit
    credit_uri: https://credit.niso.org/contributor-roles/software/
    datacite: Other
  - id: supervision
    term: Supervision
    source: credit
    credit_uri: https://credit.niso.org/contributor-roles/supervision/
    datacite: Supervisor
  - id: validation
    term: Validation
    source: credit
    credit_uri: https://credit.niso.org/contributor-roles/validation/
    datacite: Other
  - id: visualization
    term: Visualization
    source: credit
    credit_uri: https://credit.niso.org/contributor-roles/visualization/
    datacite: Other
  - id: writing-original-draft
    term: Writing – original draft
    source: credit
    credit_uri: https://credit.niso.org/contributor-roles/writing-original-draft/
    datacite: Other
  - id: writing-review-editing
    term: Writing – review & editing
    source: credit
    credit_uri: https://credit.niso.org/contributor-roles/writing-review-editing/
    datacite: Editor
  # --- practice-research (MARC relators where they fit) ---
  - id: choreographer
    term: Choreographer
    source: practice
    datacite: Other
    marc: chr
  - id: dancer
    term: Dancer
    source: practice
    datacite: Other
    marc: dnc
  - id: director
    term: Director
    source: practice
    datacite: Other
    marc: drt
  - id: set-designer
    term: Set designer
    source: practice
    datacite: Other
    marc: std
  - id: dramaturg
    term: Dramaturg
    source: practice
    datacite: Other
  - id: performer
    term: Performer
    source: practice
    datacite: Other
    marc: prf
  - id: composer
    term: Composer
    source: practice
    datacite: Other
    marc: cmp
  - id: curator
    term: Curator
    source: practice
    datacite: Other
    marc: cur


