    term: Collects
    source: datacite
    datacite: Collects
    inverse: iscollectedby
  # Free-text escape hatch, mirroring the `other` role in contributor_roles.yml:
  # selecting "Other" pairs with the sibling `type_other` (+ `type_other_inverse`)
  # free-text subproperties. `inverse: other` is the symmetric fallback used when
  # no `type_other_inverse` is supplied.
  - id: other
    term: Other
    source: datacite
    datacite: Other
    inverse: other
  # Legacy pre-DataCite vocabulary: hidden from the deposit dropdown but still
  # resolvable, so edges stored before the switch keep working. (Legacy
  # `documents` shares its id with the DataCite term above.) Remove once no
  # tenant data uses them.
  - id: sequence
    term: Sequence
    inverse: sequence-of
    color: '#5b9bd5'
    active: false
  - id: sequence-of
    term: Sequence Of
    inverse: sequence
    color: '#5b9bd5'
    active: false
  - id: source-of
    term: Source Of
    inverse: derived-from
    color: '#c0823c'
    active: false
  - id: derived-from
    term: Derived From
    inverse: source-of
    color: '#c0823c'
    active: false
  - id: pair-with
    term: Pair With
    inverse: pair-with
    color: '#b05ec0'
    active: false
  - id: response-to
    term: Response To
    inverse: referenced-by
    color: '#c9544b'
    active: false
  - id: referenced-by
    term: Referenced By
    inverse: response-to
    color: '#c9544b'
    active: false
  - id: juxtaposed-with
    term: Juxtaposed With
    inverse: juxtaposed-with
    color: '#c2a83e'
    active: false
