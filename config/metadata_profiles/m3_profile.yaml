  # Hyku machinery fields (not Enact metadata): HykuListener sets
  # show_pdf_viewer/show_pdf_download_button on the parent work when a PDF
  # file is attached (hyrax_listener.rb), so every work type must carry them
  # or characterization jobs crash with NoMethodError. Hidden from the form,
  # mirrored from Hyku's own m3 profile.
