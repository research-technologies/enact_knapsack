# These settings are to provide information about your theme
# and should follow the format
# default:
#   name: Default theme
# An optional configuration for theme colors can be defined, which will add
# a button to the appearance colors section of the admin dashboard, allowing
# the user to easily set the custom colors. Only colors which are included
# will be overwritten from the defaults.
#   theme_custom_colors:
#     collection_banner_text_color: '#000000'
#     default_button_background_color: '#FFFFFF'
#     default_button_border_color: '#5B5B5B'
#
# NOTE: Knapsack override. Adds the Enact theme. Hyku entries are preserved
# verbatim from hyrax-webapp/config/home_themes.yml; do not remove them or
# tenants on those themes lose their selection. Loaded via Hyku::Application.path_for.
#
default_home:
  banner_image: true
  featured_researcher: true
  home_page_text: false
  marketing_text: true
  name: Default home
  notes: This theme is the default Hyku view
cultural_repository:
  banner_image: true
  featured_researcher: false
  home_page_text: true
  marketing_text: true
  name: Cultural Repository
  notes: This theme is recommended for cultural repositories
institutional_repository:
  banner_image: true
  featured_researcher: true
  home_page_text: true
  marketing_text: true
  name: Institutional Repository
  notes: This theme is recommended for institutional repositories
neutral_repository:
  banner_image: true
  featured_researcher: true
  home_page_text: true
  marketing_text: true
  name: Neutral Repository
  notes: This theme is neutral and is recommended for all types of repositories
community:
  banner_image: true
  featured_researcher: false
  home_page_text: true
  marketing_text: true
  name: Community
  notes: This theme is for demoing Hyku features
enact:
  banner_image: false
  featured_researcher: false
  home_page_text: true
  marketing_text: false
  name: Enact (practice research)
  notes: Editorial museum-archive theme for the Enact national repository for UK practice research. Warm paper canvas, hairline borders, Instrument Serif display. Tenant-configurable palette via Appearance > Apply Theme Colors.
  theme_custom_colors:
    header_and_footer_background_color: '#F6F2EA'
    header_and_footer_text_color: '#1A1714'
    navbar_background_color: '#FBF8F2'
    navbar_link_background_color: '#FBF8F2'
    navbar_link_background_hover_color: '#EFE9DD'
    navbar_link_text_color: '#6B635A'
    navbar_link_text_hover_color: '#1A1714'
    link_color: '#C76A4A'
    link_hover_color: '#B05A3A'
    primary_button_background_color: '#C76A4A'
    primary_button_border_color: '#C76A4A'
    primary_button_hover_color: '#B05A3A'
    primary_button_text_color: '#FFFFFF'
    default_button_background_color: '#FBF8F2'
    default_button_border_color: '#E5DFD3'
    default_button_text_color: '#1A1714'
    facet_panel_background_color: '#F6F2EA'
    facet_panel_text_color: '#1A1714'
    footer_link_color: '#6B635A'
    footer_link_hover_color: '#1A1714'
    active_tabs_background_color: '#EFE9DD'
    collection_banner_text_color: '#1A1714'
