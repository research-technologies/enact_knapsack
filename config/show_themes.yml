# These settings are to provide information about your theme
# and should follow the format
# theme:
#   name: Theme notes
#   notes: Notes about the theme you want to display
#
# NOTE: Knapsack override. Adds the Enact show theme alongside Hyku's defaults.
# Loaded via Hyku::Application.path_for.
#
default_show:
  name: Default Show Page
  notes: This is the default Hyku show page. It is recommended for use with cultural repositories.
cultural_show:
  name: Cultural Show Page
  notes: This image based show page is recommended for cultural repositories.
scholarly_show:
  name: Scholarly Show Page
  notes: This text based show page is recommended for institutional repositories.
community_show:
  name: Community Show Page
  notes: This show page features a dual-column layout for the metadata section, and a citation modal.
enact_show:
  name: Enact Show Page
  notes: Editorial show page paired with the Enact home theme. Editorial typography, hairline tables, type-coded badges for Artefact / Event / Literature / Collection.
