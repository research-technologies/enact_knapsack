# Enact PortfolioItem - child work; one typed output (Artefact / Event /
# Literature / Collection) linked under a Portfolio.
#
# `portfolio_item_type` is the required type discriminator. `item_subtype` is a
# CV filtered by type (driven by Stimulus JS in the form).
#
# Compound attributes use `type: hash` + `multiple: true` per Hyrax 5.2's
# documented pattern. Each persisted entry is a JSONB hash. Sub-field shapes:
#
#   contributors[]: { given_name, family_name, contributor_name, name_type,
#                     role_label, role_id, role_vocabulary, name_identifier,
#                     scheme_uri, affiliation, affiliation_identifier }
#   identifiers[]:  { value, identifier_type }
#   funding_references[]: { funder_name, funder_identifier,
#                           funder_identifier_type, award_number, award_uri,
#                           award_title }
#   organisational_units[]: { name, pid, unit_type }
#   geo_locations[]: { place_name, point_latitude, point_longitude,
#                      west_bound, east_bound, south_bound, north_bound }
#   licenses[]: { rights_label, rights_uri, rights_identifier,
#                 rights_identifier_scheme, scheme_uri, lang, holder }
#
# `title` comes from core_metadata and is not redeclared here.
attributes:
  description:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "description_tesim"
    predicate: http://purl.org/dc/elements/1.1/description
    view:
      html_dl: true
    mappings:
      simple_dc_pmh: dc:description
  context_statement:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "context_statement_tesim"
    predicate: https://prvoices.org/terms/contextStatement
    view:
      html_dl: true
    mappings:
      simple_dc_pmh: dc:description
  date_created:
    type: date_time
    multiple: false
    form:
      primary: false
    index_keys:
      - "date_created_tesim"
    predicate: http://purl.org/dc/terms/created
    view:
      render_as: "linked"
      search_field: 'date_created_tesim'
      html_dl: true
    mappings:
      simple_dc_pmh: dc:date
  date_made_public:
    type: date_time
    multiple: false
    form:
      primary: false
    index_keys:
      - "date_made_public_tesim"
    predicate: http://purl.org/dc/terms/issued
    view:
      html_dl: true
    mappings:
      simple_dc_pmh: dc:date
  portfolio_item_type:
    type: string
    multiple: false
    form:
      required: true
      primary: true
    index_keys:
      - "portfolio_item_type_sim"
      - "portfolio_item_type_tesim"
    predicate: http://purl.org/dc/terms/type
    view:
      render_as: "faceted"
      html_dl: true
    mappings:
      simple_dc_pmh: dc:type
  item_subtype:
    type: string
    multiple: false
    form:
      primary: true
    index_keys:
      - "item_subtype_sim"
      - "item_subtype_tesim"
    predicate: https://prvoices.org/terms/itemSubtype
    view:
      render_as: "faceted"
      html_dl: true
    mappings:
      simple_dc_pmh: dc:type
  media_type:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "media_type_sim"
      - "media_type_tesim"
    predicate: http://purl.org/dc/elements/1.1/format
    view:
      render_as: "faceted"
      html_dl: true
    mappings:
      simple_dc_pmh: dc:format
  related_item:
