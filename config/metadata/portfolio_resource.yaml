# Enact PortfolioResource - parent work for a practice-research portfolio.
#
# Compound attributes use `type: hash` + `multiple: true` per Hyrax 5.2's
# documented pattern (see hyrax gem documentation/redirects.md). Each persisted
# entry is a JSONB hash on the parent. Sub-field shapes:
#
#   contributors[]: { given_name, family_name, contributor_name, name_type,
#                     role_label, role_id, role_vocabulary, name_identifier,
#                     scheme_uri, affiliation, affiliation_identifier }
#   identifiers[]:  { value, identifier_type }
#   funding_references[]: { funder_name, funder_identifier,
#                           funder_identifier_type, award_number, award_uri,
#                           award_title }
#   organisational_units[]: { name, pid, unit_type }
#   licenses[]: { rights_label, rights_uri, rights_identifier,
#                 rights_identifier_scheme, scheme_uri, lang, holder }
#
# `title` comes from core_metadata and is not redeclared here.
attributes:
  description:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "description_tesim"
    predicate: http://purl.org/dc/elements/1.1/description
    view:
      html_dl: true
    mappings:
      simple_dc_pmh: dc:description
  context_statement:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "context_statement_tesim"
    predicate: https://prvoices.org/terms/contextStatement
    view:
      html_dl: true
    mappings:
      simple_dc_pmh: dc:description
  date_created:
    type: date_time
    multiple: false
    form:
      primary: false
    index_keys:
      - "date_created_tesim"
    predicate: http://purl.org/dc/terms/created
    view:
      render_as: "linked"
      search_field: 'date_created_tesim'
      html_dl: true
    mappings:
      simple_dc_pmh: dc:date
  date_made_public:
    type: date_time
    multiple: false
    form:
      primary: false
    index_keys:
      - "date_made_public_tesim"
    predicate: http://purl.org/dc/terms/issued
    view:
      render_as: "linked"
      search_field: 'date_made_public_tesim'
      html_dl: true
    mappings:
      simple_dc_pmh: dc:date
  portfolio_date_range:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "portfolio_date_range_tesim"
    predicate: https://prvoices.org/terms/portfolioDateRange
    view:
      html_dl: true
  publisher:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "publisher_sim"
      - "publisher_tesim"
    predicate: http://purl.org/dc/elements/1.1/publisher
    view:
      render_as: "faceted"
      html_dl: true
    mappings:
      simple_dc_pmh: dc:publisher
  raid_identifier:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "raid_identifier_ssi"
    predicate: https://raid.org/terms/identifier
    view:
      html_dl: true
  keyword:
    type: string
    multiple: true
    form:
      primary: false
    index_keys:
      - "keyword_sim"
      - "keyword_tesim"
    predicate: http://schema.org/keywords
    view:
      render_as: "faceted"
      html_dl: true
    mappings:
      simple_dc_pmh: dc:subject
  research_group:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "research_group_sim"
      - "research_group_tesim"
    predicate: https://prvoices.org/terms/researchGroup
    view:
      render_as: "faceted"
      html_dl: true
  metadata_rights_statement:
    type: string
    multiple: false
    form:
      required: true
      primary: true
    index_keys:
      - "metadata_rights_statement_tesim"
    predicate: https://prvoices.org/terms/metadataRightsStatement
    view:
      html_dl: true
    mappings:
      simple_dc_pmh: dc:rights
  file_access_level:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "file_access_level_sim"
      - "file_access_level_tesim"
    predicate: http://purl.org/dc/terms/accessRights
    view:
      render_as: "faceted"
      html_dl: true
    mappings:
      simple_dc_pmh: dc:rights
  ref_unit_of_assessment:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "ref_unit_of_assessment_sim"
      - "ref_unit_of_assessment_tesim"
    predicate: https://prvoices.org/terms/refUnitOfAssessment
    view:
      render_as: "faceted"
      html_dl: true
  contributors:
    type: hash
    multiple: true
    form:
      display: false
    index_keys:
      - "contributor_label_tesim"
      - "contributor_label_sim"
    predicate: http://purl.org/dc/elements/1.1/contributor
    view:
      html_dl: true
    mappings:
      simple_dc_pmh: dc:contributor
  identifiers:
    type: hash
    multiple: true
    form:
      display: false
    index_keys:
      - "identifier_value_tesim"
      - "identifier_value_sim"
    predicate: http://purl.org/dc/terms/identifier
    view:
      html_dl: true
    mappings:
      simple_dc_pmh: dc:identifier
  funding_references:
    type: hash
    multiple: true
    form:
      display: false
    index_keys:
      - "funder_label_tesim"
      - "funder_label_sim"
    predicate: https://datacite.org/schema/fundingReference
    view:
      html_dl: true
  organisational_units:
    type: hash
    multiple: true
    form:
      display: false
    index_keys:
      - "organisational_unit_label_tesim"
      - "organisational_unit_label_sim"
    predicate: https://prvoices.org/terms/organisationalUnit
