# Enact PortfolioResource - parent work for a practice-research portfolio.
#
# Scalar attributes only at this stage; compound attributes (contributor,
# identifier, funding_reference, organisational_unit, license) follow in a
# separate commit using `type: hash` + `multiple: true`.
#
# `title` comes from core_metadata and is not redeclared here.
attributes:
  description:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "description_tesim"
    predicate: http://purl.org/dc/elements/1.1/description
    view:
      html_dl: true
    mappings:
      simple_dc_pmh: dc:description
  context_statement:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "context_statement_tesim"
    predicate: https://prvoices.org/terms/contextStatement
    view:
      html_dl: true
    mappings:
      simple_dc_pmh: dc:description
  date_created:
    type: date_time
    multiple: false
    form:
      primary: false
    index_keys:
      - "date_created_dtsi"
      - "date_created_tesim"
    predicate: http://purl.org/dc/terms/created
    view:
      render_as: "linked"
      search_field: 'date_created_tesim'
      html_dl: true
    mappings:
      simple_dc_pmh: dc:date
  date_made_public:
    type: date_time
    multiple: false
    form:
      primary: false
    index_keys:
      - "date_made_public_dtsi"
      - "date_made_public_tesim"
    predicate: http://purl.org/dc/terms/issued
    view:
      render_as: "linked"
      search_field: 'date_made_public_tesim'
      html_dl: true
    mappings:
      simple_dc_pmh: dc:date
  portfolio_date_range:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "portfolio_date_range_tesim"
    predicate: https://prvoices.org/terms/portfolioDateRange
    view:
      html_dl: true
  publisher:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "publisher_sim"
      - "publisher_tesim"
    predicate: http://purl.org/dc/elements/1.1/publisher
    view:
      render_as: "faceted"
      html_dl: true
    mappings:
      simple_dc_pmh: dc:publisher
  raid_identifier:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "raid_identifier_ssi"
    predicate: https://raid.org/terms/identifier
    view:
      html_dl: true
  keyword:
    type: string
    multiple: true
    form:
      primary: false
    index_keys:
      - "keyword_sim"
      - "keyword_tesim"
    predicate: http://schema.org/keywords
    view:
      render_as: "faceted"
      html_dl: true
    mappings:
      simple_dc_pmh: dc:subject
  research_group:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "research_group_sim"
      - "research_group_tesim"
    predicate: https://prvoices.org/terms/researchGroup
    view:
      render_as: "faceted"
      html_dl: true
  metadata_rights_statement:
    type: string
    multiple: false
    form:
      required: true
      primary: true
    index_keys:
      - "metadata_rights_statement_tesim"
    predicate: https://prvoices.org/terms/metadataRightsStatement
    view:
      html_dl: true
    mappings:
      simple_dc_pmh: dc:rights
  file_access_level:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "file_access_level_sim"
      - "file_access_level_tesim"
    predicate: http://purl.org/dc/terms/accessRights
    view:
      render_as: "faceted"
      html_dl: true
    mappings:
      simple_dc_pmh: dc:rights
  ref_unit_of_assessment:
    type: string
    multiple: false
    form:
      primary: false
    index_keys:
      - "ref_unit_of_assessment_sim"
      - "ref_unit_of_assessment_tesim"
    predicate: https://prvoices.org/terms/refUnitOfAssessment
    view:
      render_as: "faceted"
      html_dl: true
