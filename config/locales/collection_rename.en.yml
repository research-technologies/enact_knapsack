  simple_form:
    hints:
      collection:
        based_near: A place name related to the user collection, such as its site
          of publication, or the city, state, or country the user collection contents
          are about. Calls upon the <a href='http://www.geonames.org'>GeoNames web
          service</a>.
        contributor: A person or group you want to recognize for playing a role in
          the creation of the user collection, but not the primary role.
        creator: 'The person or group responsible for the user collection. Usually
          this is the author of the content. Personal names should be entered with
          the last name first: Smith, John'
        date_created: The date on which the user collection was created.
        description: Free-text notes about the user collection. Examples include abstracts
          of a paper or citation information for a journal article.
        identifier: A unique handle identifying the user collection. An example would
          be a DOI for a journal article, or an ISBN or OCLC number for a book.
        keyword: Words or phrases you select to describe what the user collection
          is about. These are used to search for content.
        language: The language of the user collection's content.
        license: Licensing and distribution information governing access to the user
          collection. Select from the provided drop-down list.
        publisher: The person or group making the user collection available. Generally
          this is the institution.
        related_url: A link to a website or other specific content (audio, video,
          PDF document) related to the user collection. An example is the URL of a
          research project from which the user collection was derived.
        subject: Headings or index terms describing what the user collection is about;
          these do need to conform to an existing vocabulary.
        title: A name to aid in identifying a user collection.
