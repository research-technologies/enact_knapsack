# Human-friendly labels for compound sub-properties on show-page cards.
# Hyrax::Renderers::CompoundAttributeRenderer#sub_property_label looks up
# `hyrax.compound_fields.<compound>.<sub_property>` and falls back to the
# humanized field name (which produced "Rightsuri", "Rightsidentifierscheme",
# etc.). The card title already supplies the "Rights"/"Provenance" context, so
# the sub-labels are kept short.
en:
  hyrax:
    compound_fields:
      rights:
        statement: Statement
        holder: Rights holder
      provenance:
        provenanceScheme: Scheme
        schemeURI: Scheme URL
        provenanceEmbedded: Embedded in file
        embedFormat: Embedded format
      contributors:
        contributor_name: Name
        given_name: Given name
        family_name: Family name
        role_label: Role
        name_identifier: ORCID
        affiliation: Affiliation
      relationships:
        type_other: Type (if "Other")
        # The label the relationship should read as from the related work's side
        # when a free-text "Other" type is used (e.g. "remixes" -> "is remixed
        # by"). Left blank, the relationship reads the same in both directions.
        type_other_inverse: Reverse label (if "Other")
