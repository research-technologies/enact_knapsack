        contributor_role_other: Other role
    hints:
      defaults:
        rights_statement: Rights associated with the portfolio record (distinct from rights on individual portfolio items, which carry their own license claims).
        item_subtype: A finer-grained type controlled by vocabulary for the chosen item type.
        relationship_position: Optional order number for sequenced relationships (lowest shown first).
        relationship_note: Optional free text describing why these works are related (the curatorial "why").
        contributor_role_other: Use only when the role is not in the list above; a curator may add it to the controlled vocabulary later.
  activerecord:
    models:
      portfolio:
        one: Portfolio
        other: Portfolios
      portfolio_artefact:
        one: Artefact
        other: Artefacts
      portfolio_event:
        one: Event
        other: Events
      portfolio_literature:
        one: Literature
        other: Literature
      portfolio_item_collection:
        one: Collection
        other: Collections
  hyrax:
    # Per-work-type card icons (Hyrax::ModelIcon looks up hyrax.icons.<i18n_key>,
    # falling back to hyrax.icons.default). Distinguishes the four Portfolio child
    # types from each other and from the Portfolio container.
    icons:
      portfolio: fa fa-cube
      portfolio_artefact: fa fa-paint-brush
      portfolio_event: fa fa-calendar
      portfolio_literature: fa fa-book
      portfolio_item_collection: fa fa-folder-open
    compound_fields:
      linked_record:
        # Fallback placeholder for any linked_record picker.
        placeholder: Search
        add_new: "+ Add new"
        create: Create
        cancel: Cancel
        # Per-source placeholder, keyed by the subproperty's `authority:`.
        contributors:
          placeholder: Search for a contributor
        # Add-form field labels, keyed by create_field name (and group sub-field name).
        fields:
          display_name: Name
          orcid: ORCID
          agent_type: Type
          affiliations: Affiliation
          name_identifiers: Name identifiers
          value: Identifier
          scheme: Scheme
    models:
      portfolio: Portfolio
      portfolio_artefact: Artefact
      portfolio_event: Event
      portfolio_literature: Literature
      portfolio_item_collection: Collection
    work:
      type:
        portfolio: Portfolio
        portfolio_artefact: Artefact
        portfolio_event: Event
        portfolio_literature: Literature
        portfolio_item_collection: Collection
    select_type:
      portfolio:
        name: Portfolio
        description: A practice-research portfolio - the longitudinal container for a body of creative work. Aggregates artefacts, events, literature, and collection items, and carries project-level contributors, funding, organisational units, and rights.
      portfolio_artefact:
        name: Artefact
        description: A single artefact within a portfolio - a composition, recording, score, performance documentation, photograph, design, or other discrete creative output. Carries geo_locations for site-specific work.
      portfolio_event:
        name: Event
        description: An event within a portfolio - an exhibition, performance, conference paper, public-facing presentation, or live-art happening with a venue and date. Carries geo_locations for the venue.
      portfolio_literature:
        name: Literature
        description: A written output within a portfolio - an article, monograph, methodology essay, chapter, or other text-based publication accompanying the practice work. Carries place_of_publication.
      portfolio_item_collection:
        name: Collection
        description: A grouped collection of items within a portfolio - a thematic set of related works, curated assemblage, or sub-series. Carries extent, extent_type, and collection_order.
  # Override the generic Hyku deposit-wizard start-screen path cards with
  # Portfolio-specific wording. Enact's locale loads after Hyku's, so these
  # same-key definitions win.
  hyku:
    deposit_wizard:
      select_parent:
        heading: Add to a parent work
        subtext: Search for the title of the portfolio, artefact, event, piece of literature, or collection this deposit should be added to.
      start:
        paths:
          new:
            title: Create a new Portfolio
            desc: A portfolio is the top-level work of a project — start one, then add the child works that belong to it.
            icon: fa-cube
          add:
            title: Add to an existing portfolio or work
            desc: Deposit a new item into a practice research project you've already started.
            icon: fa-sitemap
          standalone:
            title: Deposit a standalone work
            desc: Add a single artefact, event or piece of writing that isn't part of a portfolio or another work.
            icon: fa-file-o
  enact:
    deposit_wizard:
      item_start:
        heading: Add an item
        subtext: Items are the building blocks of your portfolio — artefacts, events, literature, and collections. Do you know what kind of work this is?
        modes:
          known:
            title: I know which type
            desc: Go straight to choosing the work type.
            icon: fa-check-circle
          guided:
            title: Help me decide
            desc: Start with your file, and we'll present subtype options to help you pick the work type.
            icon: fa-question-circle
      guided_confirm:
        heading: What best describes this work?
        # The instruction tail. Preceded inline by "You uploaded a [BADGE] file."
        # when a file is present (the badge is rendered by the view), or by
        # uploaded_none when there is no file.
        subtext: Pick the option that fits — the tag shows which work type each one belongs to.
        # Lead-in wrapping the file-type badge: "You uploaded a" [GIF] "file."
        uploaded_prefix: You uploaded a
        uploaded_suffix: file.
        # Shown in place of the file lead-in when nothing was uploaded.
        uploaded_none: Choose the option that best describes this work.
        show_all: Not seeing the right fit? Show all types
      errors:
        no_subtype: Please choose an option that describes your work.
    relationships:
      none: No related works within this project.
      # Label for the button that opens the interactive relationship map.
      map_button: Relationship map
      # Optional overrides for relationship type labels; the default label is
      # the term from config/authorities/relationship_types.yml. These cover
      # the legacy pre-DataCite vocabulary so edges stored under it keep their
      # original prose labels.
      types:
        sequence: Leads to
        source-of: Is the source for
        pair-with: Pairs with
        response-to: Is a response to
        juxtaposed-with: Is juxtaposed with
      # Inbound labels: how the relationship reads from the target's point of view.
      inverse_types:
        sequence-of: Continues from
        derived-from: Is derived from
        pair-with: Pairs with
        referenced-by: Is referenced by
        juxtaposed-with: Is juxtaposed with
    people_map:
      # Button on a contributor profile opening the research-network map centred
      # on that person (first-order + second-order collaborators).
      profile_link: Research network
      # Link on the contributors browse index opening the whole network.
      index_link: View as network
    homepage:
      featured_researcher:
        # Button on the home page Featured Researcher tab linking to the
        # contributors browse index ("Research profiles").
        view_all: View all research profiles
    contributors:
      agent_type: Type
      affiliation: Affiliation
      affiliations: Affiliations
      display_name: Name
      name_identifiers: Name identifiers
      # Empty state + ORCID link label for the work show-page contributors card.
      none: No contributors listed.
      orcid: ORCID
      # Admin-gated profile edit (Phase 1: no owner/claim yet).
      edit:
        title: Edit profile
        link: Edit
        submit: Save
        cancel: Cancel
        updated: Profile updated.
        forbidden: You are not authorized to edit this profile.
        affiliations_hint: One affiliation per line.
        name_identifiers_hint: "One identifier per line as `value | scheme` (e.g. 0000000121032683 | ISNI)."
      # Human labels for the agent_type enum (person | organization).
      types:
        person: Person
        organization: Organization
      index:
        title: Research profiles
        empty: No research profiles yet.
        no_results: No research profiles match your search.
        search_label: Search
        search_placeholder: Search by name or ORCID
        search_submit: Search
        reset: Reset
        type_label: Type
        type_all: All
        pagination: Research profiles pages
        prev_page: "‹ Prev"
        next_page: "Next ›"
      works:
        empty: No works yet.
        untitled: Untitled
        no_results: No works match your search.
        count:
          one: "Showing %{first}-%{last} of 1 work"
          other: "Showing %{first}-%{last} of %{total} works"
        search_label: Search works
        search_placeholder: Search works by title
        search_submit: Search
        reset: Reset
        type_label: Type
        type_all: All
        pagination: Works pages
        prev_page: "‹ Prev"
        next_page: "Next ›"
    job_statuses:
      disabled: The job statuses page is not enabled.
      nav: Job statuses
