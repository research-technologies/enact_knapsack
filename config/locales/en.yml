en:
  simple_form:
    labels:
      defaults:
        context_statement: Context statement
        date_made_public: Date made public
        date_range_of_outputs: Date range of outputs
        portfolio_identifier: Portfolio identifier (RAiD)
        research_group: Research group
        rights_statement: Rights statement
        file_access_level: File access level
        ref_unit_of_assessment: REF unit of assessment
        item_subtype: Item subtype
        media_type: Media type
        related_item: Related item
        place_of_publication: Place of publication
        extent: Extent
        extent_type: Extent type
        collection_order: Collection order
        relationship_item: Related work
        relationship_type: Relationship
        relationship_position: Position
        relationship_note: Note
        member_of_collection_ids: Add to user collection
    placeholders:
      defaults:
        member_of_collection_ids: Select a user collection…
    hints:
      defaults:
        rights_statement: Rights associated with the portfolio record (distinct from rights on individual portfolio items, which carry their own license claims).
        item_subtype: A finer-grained type controlled by vocabulary for the chosen item type.
        relationship_position: Optional order number for sequenced relationships (lowest shown first).
        relationship_note: Optional free text describing why these works are related (the curatorial "why").
  # Top-level Rails helpers namespace (NOT under `hyrax`). Hyrax renders the
  # "Add New Collection" button via t('helpers.action.collection.new').
  helpers:
    action:
      collection:
        new: Add New User Collection
  activerecord:
    models:
      portfolio:
        one: Portfolio
        other: Portfolios
      portfolio_artefact:
        one: Artefact
        other: Artefacts
      portfolio_event:
        one: Event
        other: Events
      portfolio_literature:
        one: Literature
        other: Literature
      portfolio_item_collection:
        one: Collection
        other: Collections
      collection:
        one: User Collection
        other: User Collections
      collection_resource:
        one: User Collection
        other: User Collections
  hyrax:
    admin:
      sidebar:
        collections: User Collections
        collections_report: User Collections Report
      analytics:
        collection_reports:
          index:
            title: User Collections Report
            report_header: Custom User Collections Report
          show:
            title: User Collection Report
            return_to_btn: Return to User Collections Report
          top_collections:
            top_collections: Top User Collections
    base:
      # Work show page "Member of Collections" row header. Hyrax renders it via
      # t('hyrax.base.member_of_collections.header') (samvera/hyrax#7505).
      member_of_collections:
        header: Member of User Collections
    collections:
      # Labels for the count badges on a collection's catalog search-result row
      # (sub-collections nested within it, and member works). "User Collections"
      # disambiguates from the PortfolioItemCollection work type. Hyrax renders
      # these via t('hyrax.collections.collection_counts.*') (samvera/hyrax#7505).
      collection_counts:
        collections: User Collections
        works: Works
    # Rename the generic Hyrax "Collection" object to "User Collection" wherever a
    # depositor/admin sees the bare noun, to disambiguate from the
    # PortfolioItemCollection work type. We intentionally do NOT rename the
    # collection-TYPE system (hyrax.admin.sidebar.collection_types,
    # hyrax.admin.collection_types.*): "User Collection" is one type among Admin
    # Set / Exhibits, so "User Collection Types" would be incorrect.
    collection:
      select_form:
        title: Add to user collection
        create_new: Add to new User Collection
    dashboard:
      breadcrumbs:
        collections_report: User Collections Report
      all:
        collections: All User Collections
      managed:
        collections: Managed User Collections
      my:
        collections: User Collections
        your_collections: Your User Collections
        facet_label:
          collections: 'Filter user collections:'
        action:
          add_to_collection: Add to user collection
          collection_create_success: User Collection was successfully created.
          collection_delete_success: User Collection was successfully deleted.
          collection_update_success: User Collection was successfully updated.
      collection_type_actions:
        create_collection: Create user collection
      stats:
        collections: User Collections created
    homepage:
      admin_sets:
        link: View all user collections
        tab_label: Explore User Collections
        title: Explore User Collections
      featured_collections:
        no_collections: No user collections have been featured.
        title: Featured User Collections
    search:
      form:
        option:
          my_collections:
            label_long: My User Collections
            label_short: My User Collections
    models:
      portfolio: Portfolio
      portfolio_artefact: Artefact
      portfolio_event: Event
      portfolio_literature: Literature
      portfolio_item_collection: Collection
      collection_resource: User Collection
    select_type:
      portfolio:
        name: Portfolio
        description: A practice-research portfolio - the longitudinal container for a body of creative work. Aggregates artefacts, events, literature, and collection items, and carries project-level contributors, funding, organisational units, and rights.
      portfolio_artefact:
        name: Artefact
        description: A single artefact within a portfolio - a composition, recording, score, performance documentation, photograph, design, or other discrete creative output. Carries geo_locations for site-specific work.
      portfolio_event:
        name: Event
        description: An event within a portfolio - an exhibition, performance, conference paper, public-facing presentation, or live-art happening with a venue and date. Carries geo_locations for the venue.
      portfolio_literature:
        name: Literature
        description: A written output within a portfolio - an article, monograph, methodology essay, chapter, or other text-based publication accompanying the practice work. Carries place_of_publication.
      portfolio_item_collection:
        name: Collection
        description: A grouped collection of items within a portfolio - a thematic set of related works, curated assemblage, or sub-series. Carries extent, extent_type, and collection_order.
  enact:
    relationships:
      none: No related works within this project.
      # Label for the button that opens the interactive relationship map.
      map_button: Relationship map
      # Outbound relationship labels, keyed by the stored DataCite-aligned term.
      types:
        sequence: Leads to
        source-of: Is the source for
        pair-with: Pairs with
        response-to: Is a response to
        documents: Documents
        juxtaposed-with: Is juxtaposed with
      # Inbound labels: how the relationship reads from the target's point of view.
      inverse_types:
        sequence-of: Continues from
        derived-from: Is derived from
        pair-with: Pairs with
        referenced-by: Is referenced by
        documented-by: Is documented by
        juxtaposed-with: Is juxtaposed with
  # Hyku-namespaced strings that Hyku renders via t() (samvera/hyku#3113).
  # Relabel only the collection-y ones to "User Collection"; leave Works/Users
  # etc. untouched.
  hyku:
    admin:
      stats:
        tab_collections: User Collections
        collections_over_time: User Collections over time
    # Values of the "Type" facet (generic_type_sim). Hyku maps each token via
    # generic_type_facet_label -> t(token, scope: 'hyku.generic_type'). Only the
    # bare "Collection" noun is renamed; Work / Admin Set are left to default.
    generic_type:
      collection: User Collection
    themes:
      browse_by_collection: Browse by User Collection
      collections: User Collections
      featured_collections: Featured User Collections
  # "Member of Collections" facet heading. Hyku (samvera/hyku#3113) dropped the
  # inline label from catalog_controller, so the blacklight locale key now wins.
  blacklight:
    search:
      fields:
        facet:
          member_of_collections_ssim: User Collections
